<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>متجر أنيق — منزلق المنتجات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: #1a1612;
    font-family: "Tajawal", "Inter", system-ui, sans-serif;
    color: #2a2520;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: auto;
  }
  /* Hide scrollbars on the product rails */
  .om-product-rail::-webkit-scrollbar { display: none; height: 0; }
  /* Subtle native momentum & smoothness */
  .om-product-rail { -webkit-overflow-scrolling: touch; scroll-behavior: auto; }

  /* Make sure focus rings don't show on touch */
  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid #a04a2a; outline-offset: 2px; }

  /* Numerals: keep prices LTR even inside RTL */
  span[data-num], .num { font-feature-settings: "tnum" 1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="products.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="product-image.jsx"></script>
<script type="text/babel" src="image-carousel.jsx"></script>
<script type="text/babel" src="product-card.jsx"></script>
<script type="text/babel" src="product-slider.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
